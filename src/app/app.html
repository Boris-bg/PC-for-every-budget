<div class="content">
  <mat-sidenav-container style="height: 100vh;">
    <mat-sidenav #sidenav mode="over" class="sidenav" [fixedInViewport]="true">
      <mat-nav-list>
        <a mat-list-item routerLink="/" (click)="sidenav.close()">
<!--          <mat-icon>home</mat-icon>-->
          <span>Home</span>
        </a>
        <a mat-list-item routerLink="/products" (click)="sidenav.close()">
<!--          <mat-icon>products</mat-icon>-->
          <span>Products</span>
        </a>
        <a mat-list-item routerLink="/discounts" (click)="sidenav.close()">
<!--          <mat-icon>discounts</mat-icon>-->
          <span>Discounts</span>
        </a>
        <a mat-list-item routerLink="/about-us" (click)="sidenav.close()">
<!--          <mat-icon>about us</mat-icon>-->
          <span>About us</span>
        </a>
        <a mat-list-item routerLink="/contacts" (click)="sidenav.close()">
<!--          <mat-icon>contacts</mat-icon>-->
          <span>Contacts</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content color="primary">
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle menu" style="position: absolute">
        <mat-icon>☰</mat-icon>
      </button>

      <header>
        <div>
          <img src="logo.jpg" width="70" height="70" alt="Logo"/>
          <h1>PC for every budget</h1>
        </div>

        <div>
          <mat-form-field appearance="fill">
            <mat-label>Search</mat-label>
            <input [(ngModel)]="itemForSearching" matInput placeholder=""/>
          </mat-form-field>
          <button (click)="search()">Search</button>
        </div>

        <div>
          <button>Log in</button>
        </div>

      </header>

      <nav>
        <ul>
          <li>
            <button class="special-button" routerLink="/"><p>Home</p></button>
          </li>
          <li>
            <button class="special-button" routerLink="/"><p>Products</p></button>
          </li>
          <li>
            <button routerLink="/">Discounts</button>
          </li>
          <li>
            <button routerLink="/">About us</button>
          </li>
          <li>
            <button routerLink="/">Contacts</button>
          </li>
        </ul>
      </nav>

      <div class="container">
        <input disabled ngModel="{{demo}}">
      </div>

      <footer>

      </footer>

      <router-outlet></router-outlet>

    </mat-sidenav-content>
  </mat-sidenav-container>


</div>
