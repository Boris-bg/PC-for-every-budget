<main class="main">
  <div class="content">
    <header>
      <div>
        <img src="logo.jpg" width="70" height="70" alt="Logo"/>
        <h1>PC for every budget</h1>
      </div>

      <div>
        <mat-form-field appearance="fill">
          <mat-label>Search</mat-label>
          <input [(ngModel)]="itemForSearching" matInput placeholder=""/>
        </mat-form-field>
        <button (click)="search()">Search</button>
      </div>

      <div>
        <button>Log in</button>
      </div>

    </header>

    <nav>
      <ul>
        <li>
          <a routerLink="/" style="background: darkorange; border-radius: 20px" >Home</a>
        </li>
        <li>
          <a routerLink="/products" style="background: darkorange; border-radius: 20px" >Products</a>
        </li>
        <li>
          <a routerLink="/discount">Discounts</a>
        </li>
        <li>
          <a routerLink="/about">About us</a>
        </li>
        <li>
          <a routerLink="/contact">Contact</a>
        </li>
      </ul>
    </nav>

    <div class="container">
      <input disabled ngModel="{{demo}}">
    </div>

    <footer>

    </footer>
  </div>
</main>


<router-outlet/>
