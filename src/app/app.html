<div class="content">
  <mat-sidenav-container>
    <mat-sidenav #sidenav mode="over" class="sidenav" [fixedInViewport]="true">
      <mat-nav-list>
        <a mat-list-item routerLink="/" (click)="sidenav.close()">
<!--          <mat-icon>home</mat-icon>-->
          <span>Home</span>
        </a>
        <a mat-list-item routerLink="/products" (click)="sidenav.close()">
<!--          <mat-icon>products</mat-icon>-->
          <span>Products</span>
        </a>
        <a mat-list-item routerLink="/discounts" (click)="sidenav.close()">
<!--          <mat-icon>discounts</mat-icon>-->
          <span>Discounts</span>
        </a>
        <a mat-list-item routerLink="/about-us" (click)="sidenav.close()">
<!--          <mat-icon>about us</mat-icon>-->
          <span>About us</span>
        </a>
        <a mat-list-item routerLink="/contacts" (click)="sidenav.close()">
<!--          <mat-icon>contacts</mat-icon>-->
          <span>Contacts</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content color="primary">
      <header>
        <div style="flex: 1; justify-content: flex-start">
          <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle menu">
            <mat-icon>☰</mat-icon>
          </button>
          <h1>PC for every budget</h1>
        </div>

        <div>
          <mat-form-field appearance="outline" style="width: 300px; height: 48px">
            <mat-label>What are you looking for?</mat-label>
            <input [(ngModel)]="itemForSearching" matInput placeholder=""/>
          </mat-form-field>
          <button (click)="search()">Search</button>
        </div>

        <div style="flex: 1; justify-content: flex-end;">
          <button>Log in</button>
        </div>

      </header>

      <nav>
        <ul>
          <li>
            <button class="special-button" routerLink="/"><p>Home</p></button>
          </li>
          <li>
            <button class="special-button" routerLink="/products"><p>Products</p></button>
          </li>
          <li>
            <button routerLink="/discounts">Discounts</button>
          </li>
          <li>
            <button routerLink="/about-us">About us</button>
          </li>
          <li>
            <button routerLink="/contacts">Contacts</button>
          </li>
        </ul>
      </nav>

      <router-outlet></router-outlet>

      <footer class="footer">
        <div class="footer-content">
          <div class="footer-left">
            <img src="logo.jpg" alt="Logo" width="50" height="50" />
            <span>© 2025 PC for every budget — All rights reserved.</span>
          </div>

          <div class="footer-links">
            <a routerLink="/about-us">About us</a>
            <a routerLink="/contacts">Contacts</a>
            <a href="https://github.com/your-repo" target="_blank">GitHub</a>
          </div>
        </div>
      </footer>

    </mat-sidenav-content>
  </mat-sidenav-container>


</div>
