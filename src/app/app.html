<div class="content">
  <mat-sidenav-container>
    <mat-sidenav #sidenav mode="over" class="sidenav" [fixedInViewport]="true">
      <mat-nav-list>
        <a mat-list-item routerLink="/" (click)="sidenav.close()">
          <span><img src="home.png" alt="Начална страница" width="40px" height="40px"></span>
        </a>
        <a mat-list-item routerLink="/products" (click)="sidenav.close()">
          <span>Продукти</span>
        </a>
        <a mat-list-item routerLink="/discounts" (click)="sidenav.close()">
          <span>Промоции</span>
        </a>
        <a mat-list-item routerLink="/about-us" (click)="sidenav.close()">
          <span>За нас</span>
        </a>
        <a mat-list-item routerLink="/contacts" (click)="sidenav.close()">
          <span>Контакти</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content color="primary">
      <header>
        <div style="flex: 1; justify-content: flex-start">
          <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle menu">
            <mat-icon>☰</mat-icon>
          </button>
          <h1>PC за всеки бюджет</h1>
        </div>

        <div>
          <mat-form-field appearance="outline" style="width: 300px; height: 48px">
            <mat-label>Какво търсите днес?</mat-label>
            <input [(ngModel)]="itemForSearching" matInput placeholder=""/>
          </mat-form-field>
          <button (click)="search()">Търси</button>
        </div>

        <div style="flex: 1; justify-content: flex-end;">
          <button>Вход</button>
        </div>

      </header>

      <nav>
        <ul>
          <li>
            <button class="special-button" style="font-size: 20px" routerLink="/"><p>Начална<br> страница</p></button>
          </li>
          <li>
            <button class="special-button" routerLink="/products"><p>Продукти</p></button>
          </li>
          <li>
            <button routerLink="/discounts">Промоции</button>
          </li>
          <li>
            <button routerLink="/about-us">За нас</button>
          </li>
          <li>
            <button routerLink="/contacts">Контакти</button>
          </li>
        </ul>
      </nav>

      <router-outlet></router-outlet>

      <footer class="footer">
        <div class="footer-content">
          <div class="footer-left">
            <img src="logo.jpg" alt="Logo" width="50" height="50" />
            <span>© 2025 PC за всеки бюджет — Всички права запазени.</span>
          </div>

          <div class="footer-links">
            <a routerLink="/about-us">За нас</a>
            <a routerLink="/contacts">Контакти</a>
            <a href="https://github.com/Boris-bg/PC-for-every-budget.git" target="_blank">GitHub</a>
          </div>
        </div>
      </footer>

    </mat-sidenav-content>
  </mat-sidenav-container>


</div>
