<main class="main">
  <div class="content">
    <header>
      <div>
        <img src="logo.jpg" width="70" height="70" alt="Logo"/>
        <h1>PC for every budget</h1>
      </div>

      <div>
        <mat-form-field appearance="fill">
          <mat-label>Search</mat-label>
          <input [(ngModel)]="itemForSearching" matInput placeholder=""/>
        </mat-form-field>
        <button (click)="search()">Search</button>
      </div>

      <div>
        <button>Log in</button>
      </div>

    </header>

    <nav>
      <ul>
        <li>
          <button><p style="background: darkorange; border-radius: 20px">Home</p></button>
        </li>
        <li>
          <button><p style="background: darkorange; border-radius: 20px">Products</p></button>
        </li>
        <li>
          <button>Discounts</button>
        </li>
        <li>
          <button>About us</button>
        </li>
        <li>
          <button>Contacts</button>
        </li>
      </ul>
    </nav>

    <div class="container">
      <input disabled ngModel="{{demo}}">
    </div>

    <footer>

    </footer>
  </div>
</main>


<router-outlet/>
